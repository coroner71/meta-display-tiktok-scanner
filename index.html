<!doctype html>
<html lang="en" data-app-version="native-video-feed-1">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07070a">
    <title>Lens Video Feed</title>
    <link rel="manifest" href="./site.webmanifest">
    <link rel="stylesheet" href="./styles.css?v=native-video-feed-1">
  </head>
  <body>
    <main class="feed-shell">
      <section class="video-stage" aria-labelledby="app-title">
        <div class="stage-header">
          <div>
            <p class="eyebrow">Meta Display Web App</p>
            <h1 id="app-title">Lens Video Feed</h1>
          </div>
          <div class="status-bar">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="statusText">Loading</span>
          </div>
        </div>

        <div class="video-host">
          <video id="feedVideo" playsinline muted autoplay loop preload="metadata"></video>
          <div id="videoFallback" class="empty-state" hidden>
            <strong>Video unavailable</strong>
            <span id="fallbackText">This video could not be loaded.</span>
          </div>
        </div>

        <div class="feed-controls" aria-label="Feed controls">
          <button id="previousButton" type="button">Previous</button>
          <button id="playButton" type="button">Pause</button>
          <button id="nextButton" type="button">Next</button>
        </div>

        <p id="feedMeta" class="feed-meta">Video 1</p>
      </section>
    </main>

    <script src="./app.js?v=native-video-feed-1" type="module"></script>
  </body>
</html>
