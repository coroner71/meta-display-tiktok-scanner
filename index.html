<!doctype html>
<html lang="en" data-app-version="glasses-feed-1">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07070a">
    <title>TikTok Lens Feed</title>
    <link rel="manifest" href="./site.webmanifest">
    <link rel="stylesheet" href="./styles.css?v=glasses-feed-1">
    <script async src="https://www.tiktok.com/embed.js"></script>
  </head>
  <body>
    <main class="feed-shell">
      <section class="video-stage" aria-labelledby="app-title">
        <div class="stage-header">
          <div>
            <p class="eyebrow">Meta Display Web App</p>
            <h1 id="app-title">TikTok Lens Feed</h1>
          </div>
          <div class="status-bar">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="statusText">Loading</span>
          </div>
        </div>

        <div id="embedHost" class="video-host">
          <div class="empty-state">
            <strong>Loading video</strong>
            <span>Preparing the feed.</span>
          </div>
        </div>

        <div class="feed-controls" aria-label="Feed controls">
          <button id="previousButton" type="button">Previous</button>
          <button id="autoButton" type="button" aria-pressed="true">Auto scan on</button>
          <button id="nextButton" type="button">Next</button>
        </div>

        <p id="feedMeta" class="feed-meta">Video 1</p>
      </section>
    </main>

    <script src="./app.js?v=glasses-feed-1" type="module"></script>
  </body>
</html>
